name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/4yourlife
            git pull https://${{ secrets.TOKEN_GITHUB }}@github.com/BBFEcuador/4yourlife.git
            ./gradlew bootJar
            echo "matando java -jar"
            pkill -f 'java -jar build/libs/4yourlife-0.0.1-SNAPSHOT.jar' || true
            echo "creando directorio de archivos"
            mkdir -p /var/log/4yourlife
            echo "cerrando sesion de screen si existe"
            screen -S java-app -X quit || true
            echo "nueva sesion de screen con java"
            screen -dmS java-app bash -c "java -jar build/libs/4yourlife-0.0.1-SNAPSHOT.jar > /var/log/4yourlife/app.log 2>&1"
