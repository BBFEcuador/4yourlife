name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/4yourlife
            git pull https://${{ secrets.TOKEN_GITHUB }}@github.com/BBFEcuador/4yourlife.git
            ./gradlew bootJar

            # matar solo la sesión de la app si existe
            tmux kill-session -t java-app 2>/dev/null || true
            rm -f /tmp/shared-tmux
            mkdir -p /var/log/4yourlife

            # iniciar app en tmux y redirigir logs
            tmux -S /tmp/shared-tmux new-session -d -s java-app -c /var/www/4yourlife \
              "java -jar build/libs/4yourlife-0.0.1-SNAPSHOT.jar > /var/log/4yourlife/app.log 2>&1"

            chmod 777 /tmp/shared-tmux

            # mostrar últimas 100 líneas del log (no en vivo, para no bloquear)
            tail -n 100 /var/log/4yourlife/app.log
