name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/4yourlife
            git pull https://${{ secrets.TOKEN_GITHUB }}@github.com/BBFEcuador/4yourlife.git
            ./gradlew bootJar
            echo "matando sesion de tmux"
            tmux kill-session -t java-app 2>/dev/null || true
            echo "matando proceso java -jar"
            pkill -f 'java -jar build/libs/4yourlife-0.0.1-SNAPSHOT.jar' || true
            echo "matando carpeta compartida de tmux"
            rm -f /tmp/shared-tmux
            echo "iniciando nueva sesion de tmux"
            setsid tmux -S /tmp/shared-tmux new-session -d -s java-app -c /var/www/4yourlife bash -c "java -jar build/libs/4yourlife-0.0.1-SNAPSHOT.jar"
