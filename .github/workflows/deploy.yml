name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/4yourlife
            git pull https://${{secrets.TOKEN_GITHUB}}@github.com/BBFEcuador/4yourlife.git
            ./gradlew bootJar
            tmux -S /tmp/shared-tmux kill-session -t java-app 2>/dev/null || true
            sleep 3
            tmux -S /tmp/shared-tmux new-session -d -s java-app -c /var/www/4yourlife 'java -jar build/libs/*.jar'
            chmod 777 /tmp/shared-tmux
            tmux -S /tmp/shared-tmux list-sessions | grep java-app
